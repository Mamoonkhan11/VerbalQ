services:
  - type: web
    name: verbalq-backend
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PORT
        value: 5000
    healthCheckPath: /api/health
    autoDeploy: true
