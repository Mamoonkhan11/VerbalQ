services:
  - type: web
    name: verbalq-ml-service
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        value: mistral
    healthCheckPath: /health
    autoDeploy: true
