services:
  - type: web
    name: verbalq-ml-service
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 8001
      - key: OLLAMA_URL
        sync: false
      - key: OLLAMA_MODEL
        value: mistral
    healthCheckPath: /health
    autoDeploy: true
